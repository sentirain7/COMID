# Mineral / Element-Level LJ Catalog (SSOT)
#
# Wave 4 contract
# ===============
#
# This file is the Single Source of Truth for two element-level LJ
# parameter sets that the runtime layered/inorganic builders consume:
#
# 1. ``interface_ff``: INTERFACE FF mineral parameters
#    (Heinz 2013, Emami 2014). Used for the cross-interaction LJ on
#    crystal slab atoms in LAYER_BULKFF builds AND for inorganic
#    additive elements that lack a curated site-rule profile in
#    ``inorganic_profiles.yaml``.
#
# 2. ``uff_fallback``: UFF (Rappé 1992) element-level fallback used as
#    the last-resort when neither a curated profile nor an INTERFACE
#    FF entry covers an element. Charges are zeroed because UFF was
#    fit without electrostatics.
#
# Why split mineral_lj_catalog and inorganic_profiles?
#
# * ``inorganic_profiles.yaml`` (Wave 0/2) is a *site-rule* SSOT:
#   element + neighbor pattern → site type + curated bonded params
#   (silica Si_tet, O_br, O_h, H_oh; future Al_oct, Mg_oct, ...).
#   Each profile is a complete physics package for one mineral phase.
#
# * ``mineral_lj_catalog.yaml`` (this file) is a flat *element-level*
#   SSOT: element symbol → LJ ε, σ, mass. No site rules, no bonded
#   params, no neighbor patterns. The catalog is consumed when the
#   site-rule path is not applicable (e.g., a frozen calcite slab in
#   a LAYER_BULKFF build, where only cross interactions matter).
#
# The two SSOTs INTENTIONALLY co-exist. Plan v3 explicitly forbids
# folding them into a single yaml or a single executor — that would
# couple the cross-interaction LJ catalog (cheap, additive) to the
# site-rule physics package (expensive, mineral-specific).
#
# Numerical equivalence
# =====================
#
# The legacy hardcoded dicts in ``src/forcefield/interface_ff.py``
# and ``src/forcefield/uff_element_fallback.py`` are the historical
# truth. Wave 4 extracts those dicts into this yaml verbatim. The
# regression test ``tests/unit/test_interface_ff_yaml_equivalence.py``
# locks ``yaml ≡ legacy hardcoded`` element by element so the two
# SSOTs cannot drift.
#
# When a future PR needs to update a value (e.g., new INTERFACE FF
# revision for Cu / Ni), the yaml is the place to edit. The hardcoded
# dicts in the .py files stay as a runtime safety net for tmp_path
# test environments that do not ship the yaml; the equivalence test
# enforces that any edit lands in BOTH places.
#
# References
# ==========
#
# * INTERFACE FF (mineral oxide / carbonate / FCC metal):
#   - Heinz, H.; Lin, T.-J.; Mishra, R. K.; Emami, F. S. *Langmuir*
#     2013, 29, 1754–1765.
#   - Emami, F. S. et al. *Chem. Mater.* 2014, 26, 2647–2658
#     (silica surface model).
#   - Heinz, H. et al. *J. Phys. Chem. C* 2008, 112, 17281–17290
#     (FCC metal 12-6 LJ).
#   - Mishra, R. K. et al. *Cem. Concr. Res.* 2017, 102, 68–89
#     (cemff database).
# * UFF (universal element fallback):
#   - Rappé, A. K.; Casewit, C. J.; Colwell, K. S.; Goddard, W. A.;
#     Skiff, W. M. *J. Am. Chem. Soc.* 1992, 114, 10024–10035.
#
# Units
# =====
# - mass:    amu (atomic mass units)
# - sigma:   Angstrom
# - epsilon: kcal/mol
# - charge:  electron charge units (e). UFF entries default to 0.0
#            because UFF was fit without electrostatics.

version: "1.0"
schema_version: 1

# ============================================================================
# INTERFACE FF mineral elements (Wave 4 extraction)
# ============================================================================
#
# Each entry mirrors src/forcefield/interface_ff.py INTERFACE_FF_MINERAL_PARAMS
# verbatim. The legacy dict ships as a runtime safety net; this yaml is the
# editable source. Numerical equivalence is locked by
# tests/unit/test_interface_ff_yaml_equivalence.py.

interface_ff:
  # ── Oxide / Silicate ──────────────────────────────────────────────────────
  Si:
    sigma: 3.302
    epsilon: 0.00040
    description: "INTERFACE FF Si (tetrahedral, quartz/silicate)"
  O:
    sigma: 3.166
    epsilon: 0.15540
    description: "INTERFACE FF O (oxide/carbonate surface)"
  Al:
    sigma: 3.300
    epsilon: 0.00500
    description: "INTERFACE FF Al (octahedral, corundum)"
  Ti:
    sigma: 3.175
    epsilon: 0.01700
    description: "INTERFACE FF Ti (rutile)"
  Fe:
    sigma: 2.912
    epsilon: 0.01300
    description: "INTERFACE FF Fe (hematite)"
  Zn:
    sigma: 2.763
    epsilon: 0.12400
    description: "INTERFACE FF Zn (zincite)"

  # ── Carbonate ─────────────────────────────────────────────────────────────
  C:
    sigma: 3.296
    epsilon: 0.06800
    description: "INTERFACE FF C (carbonate CO3)"

  # ── Alkaline earth / Alkali ───────────────────────────────────────────────
  Ca:
    sigma: 3.200
    epsilon: 0.10000
    description: "INTERFACE FF Ca (calcite/lime)"
  Mg:
    sigma: 3.021
    epsilon: 0.11100
    description: "INTERFACE FF Mg (periclase/magnesite)"
  Na:
    sigma: 2.983
    epsilon: 0.03000
    description: "INTERFACE FF Na (halite, ionic)"
  K:
    sigma: 3.812
    epsilon: 0.03500
    description: "INTERFACE FF K (sylvite, ionic)"

  # ── Halide ────────────────────────────────────────────────────────────────
  Cl:
    sigma: 3.947
    epsilon: 0.22700
    description: "INTERFACE FF Cl (halide, ionic)"

  # ── FCC Metals (Heinz et al. 2008, J. Phys. Chem. C 112, 17281) ───────────
  # 12-6 LJ fitted to reproduce experimental surface energies of FCC metals.
  # Large epsilon values are intentional: the 12-6 form must capture metallic
  # cohesion that is normally described by EAM/MEAM. For frozen crystal
  # slabs only the cross-interaction with the binder matters.
  Cu:
    sigma: 2.616
    epsilon: 4.7200
    description: "INTERFACE FF Cu (FCC metal surface)"
  Ni:
    sigma: 2.552
    epsilon: 5.6500
    description: "INTERFACE FF Ni (FCC metal surface)"

  # ── Hydroxyl ──────────────────────────────────────────────────────────────
  H:
    sigma: 1.085
    epsilon: 0.01300
    description: "INTERFACE FF H (surface hydroxyl)"

