# === Atmospheric / Environmental ===
# Note on ff_assignment routing (Wave 0 SSOT):
# - Small organic molecules (water, fuel, alcohols, organic acids) → organic_rdkit_legacy
# - Ionic salts and strong electrolytes → ionic_profile (currently blocked_placeholder
#   until Wave 3 curates a literature-backed ionic profile; this prevents silent
#   misrouting through the RDKit/MMFF94 organic path which is meaningless for ions).
- base_id: H2O
