structure_sizes:
  X1:
    multiplier: 1
    total_molecules: 72
    description: Base size - minimum for density calculations
    recommended_for:
    - density
    - glass_transition
  X2:
    multiplier: 2
    total_molecules: 144
    description: 2x size - intermediate
    recommended_for:
    - density
    - glass_transition
  X3:
    multiplier: 3
    total_molecules: 216
    description: 3x size - recommended for RDF and energy calculations
    recommended_for:
    - density
    - glass_transition
    - rdf
    - energy
    - tensile_strength
    notes: Required for temperature-dependent RDF analysis per Yun (2024)
