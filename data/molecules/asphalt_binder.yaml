library:
  name: asphalt_binder
  version: '1.1'
  description: Binder and aging molecule catalog (SSOT)
  file_format: mol
  reference:
    paper: Li and Greenfield (2014)
    doi: 10.1016/j.fuel.2013.07.012
    validation_paper: Yun (2024)
    validation_doi: 10.7855/IJHE.2024.26.6.013
aging_categories:
  non_aging:
    directory: asphalt_binder/non_aging_moles
    prefix: U
    description: Unaged (virgin) asphalt molecules
    fallback_to: null
  short_aging:
    directory: asphalt_binder/short_aging_moles
    prefix: S
    description: Short-term aged (RTFOT equivalent)
    fallback_to: non_aging
  long_aging:
    directory: asphalt_binder/long_aging_moles
    prefix: L
    description: Long-term aged (PAV equivalent)
    fallback_to: non_aging
sara_mapping:
  AR: aromatic
  AS: asphaltene
  RE: resin
  SA: saturate
temperature_codes:
  0293: 293
file_pattern: '{prefix}-{sara}-{name}-{temp_code}NPT_Mol.mol'
molecules:
# SARA binder molecules — all use organic_rdkit_legacy route (active baseline).
# High-accuracy organic_curated_artifact promotion is per-molecule and requires
# a curated artifact in data/forcefield_artifacts/organic_gaff2/.
