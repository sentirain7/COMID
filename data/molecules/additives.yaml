library:
  name: additives
  version: '1.2'
  description: Additive catalog SSOT for binder-cell single/batch UI and backend
  file_format: mol
directory: additives
# ff_assignment routing (Wave 0 SSOT — refreshed v00.99.41):
# - Active inorganic additives with a curated profile → inorganic_profile + source_id
# - Inorganic additives whose profile is still being curated → inorganic_profile
#   + status: blocked_placeholder (router rejects, precompute/build fail-closed)
# - Organic polymers/waxes/surfactants → organic_curated_artifact + GAFF2 source_id
#   (the legacy organic_rdkit_legacy / organic_typing routes were retired in
#   Phase 6 and are now mapped to BLOCKED for safety).
# - Carbon allotropes (CNT, Graphine) use organic_curated_artifact route
#   with individual source_ids (Carbon_Nano_Tube, Graphine). Their artifacts
#   are auto-generated via fragment fallback (generator=fragment_fallback_gaff2)
#   when antechamber fails due to bond path explosion. v01.00.12+.
