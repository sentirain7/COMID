# Grafana Dashboard Provisioning

apiVersion: 1

providers:
  - name: 'Asphalt MD Dashboards'
    orgId: 1
    folder: 'Asphalt MD'
    folderUid: 'asphalt-md'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
