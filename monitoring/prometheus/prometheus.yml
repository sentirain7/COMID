# Prometheus Configuration for Asphalt MD Monitoring
# 
# This configuration collects metrics from:
# - FastAPI application (via prometheus_fastapi_instrumentator)
# - Celery workers (via celery-exporter or flower)
# - Redis (via redis_exporter)
# - Custom application metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'asphalt-md'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - "alerts/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # FastAPI Application metrics
  - job_name: 'asphalt-api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Celery Flower metrics (if using Flower)
  - job_name: 'celery-flower'
    static_configs:
      - targets: ['host.docker.internal:5555']
    metrics_path: /metrics
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # NVIDIA GPU metrics (if nvidia-dcgm-exporter is running)
  - job_name: 'gpu'
    static_configs:
      - targets: ['host.docker.internal:9400']
    scrape_interval: 15s
